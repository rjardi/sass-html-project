  <main>
    <h1>Registro</h1>
    <p>Resgistrate para poder accder a toda la academia</p>

    <form action="post" name="registro"  enctype="multipart/form-data" >
      <p>
        <label for="name">Nombre completo</label><br>
        <input type="text" name="nombre" id="name"><br>
      </p>
      <p>
        <label for="birth-date">Fecha nacimiento</label><br>
        <input type="date" name="aniversario" id="birth-date"><br>
      </p>
      <p>
        <label for="mail">Email</label><br>
        <input type="email" name="email" id="mail" required><br>
      </p>
      <p>
        <label for="address">Dirección</label><br>
        <input type="text" name="direccion" id="address"><br>
      </p>
      <p>
        <label for="website">Página web</label><br>
        <input type="url" name="web" id="website"><br>
      </p>
      <p>
        <label for="picture">Foto de perfil</label><br>
        <input type="file" name="foto" id="picture"><br>
      </p>
      <p>
        <label for="bio">Biografía:</label><br>
        <textarea name="biografia" id="bio" cols="30" rows="10"></textarea><br>
      </p>
      <p>
        <button>Enviar</button>
        <input type="reset" value="Borrar el formulario">
      </p>
    </form>

  </main>

  <footer>
